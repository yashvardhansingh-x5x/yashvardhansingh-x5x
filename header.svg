<svg viewBox="0 0 1500 400" xmlns="http://www.w3.org/2000/svg" width="1500" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0f1a"/>
      <stop offset="40%"  stop-color="#0f1b35"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="glowL" cx="15%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#1e3a5f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="85%" cy="40%" r="40%">
      <stop offset="0%"   stop-color="#0a2a4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6AD3F7" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#6AD3F7" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#7aa2f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#7aa2f7" stop-opacity="0.5"/>
      <stop offset="65%"  stop-color="#6AD3F7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6AD3F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="1500" height="400" rx="16"/>
    </clipPath>
    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Base + glow layers -->
    <rect width="1500" height="400" fill="url(#bg)"/>
    <rect width="1500" height="400" fill="url(#glowL)"/>
    <rect width="1500" height="400" fill="url(#glowR)"/>

    <!-- Grid lines -->
    <g stroke="#1e3a5f" stroke-width="0.6" opacity="0.3">
      <line x1="100"  y1="0" x2="100"  y2="400"/>
      <line x1="200"  y1="0" x2="200"  y2="400"/>
      <line x1="300"  y1="0" x2="300"  y2="400"/>
      <line x1="400"  y1="0" x2="400"  y2="400"/>
      <line x1="500"  y1="0" x2="500"  y2="400"/>
      <line x1="600"  y1="0" x2="600"  y2="400"/>
      <line x1="700"  y1="0" x2="700"  y2="400"/>
      <line x1="800"  y1="0" x2="800"  y2="400"/>
      <line x1="900"  y1="0" x2="900"  y2="400"/>
      <line x1="1000" y1="0" x2="1000" y2="400"/>
      <line x1="1100" y1="0" x2="1100" y2="400"/>
      <line x1="1200" y1="0" x2="1200" y2="400"/>
      <line x1="1300" y1="0" x2="1300" y2="400"/>
      <line x1="1400" y1="0" x2="1400" y2="400"/>
      <line x1="0" y1="80"  x2="1500" y2="80"/>
      <line x1="0" y1="160" x2="1500" y2="160"/>
      <line x1="0" y1="240" x2="1500" y2="240"/>
      <line x1="0" y1="320" x2="1500" y2="320"/>
    </g>

    <!-- Grid intersection dots -->
    <g fill="#7aa2f7" opacity="0.22">
      <circle cx="100"  cy="80"  r="2.5"/>
      <circle cx="200"  cy="160" r="2.5"/>
      <circle cx="300"  cy="80"  r="2.5"/>
      <circle cx="400"  cy="320" r="2.5"/>
      <circle cx="500"  cy="160" r="2.5"/>
      <circle cx="600"  cy="240" r="2"/>
      <circle cx="900"  cy="160" r="2"/>
      <circle cx="1000" cy="80"  r="2.5"/>
      <circle cx="1100" cy="240" r="2.5"/>
      <circle cx="1200" cy="160" r="2.5"/>
      <circle cx="1300" cy="320" r="2.5"/>
      <circle cx="1400" cy="80"  r="2.5"/>
      <circle cx="100"  cy="320" r="1.5"/>
      <circle cx="1400" cy="320" r="1.5"/>
    </g>

    <!-- Big bracket decorations -->
    <text x="54" y="278" font-family="Courier New, monospace" font-size="200" font-weight="700"
          fill="#4a78cc" opacity="0.1">{</text>
    <text x="1376" y="278" font-family="Courier New, monospace" font-size="200" font-weight="700"
          fill="#4a78cc" opacity="0.1">}</text>

    <!-- Accent lines -->
    <rect x="0" y="0"   width="1500" height="3" fill="url(#accentTop)"/>
    <rect x="0" y="397" width="1500" height="3" fill="url(#accentBot)"/>

    <!-- Code decoration (subtle) -->
    <text x="230" y="44" font-family="Courier New, monospace" font-size="11"
          fill="#6AD3F7" opacity="0.16">def build_and_ship():</text>
    <text x="230" y="59" font-family="Courier New, monospace" font-size="11"
          fill="#6AD3F7" opacity="0.16">    return deploy(code, cloud)</text>
    <text x="1040" y="348" font-family="Courier New, monospace" font-size="11"
          fill="#6AD3F7" opacity="0.16">// scale to infinity</text>
    <text x="1040" y="363" font-family="Courier New, monospace" font-size="11"
          fill="#6AD3F7" opacity="0.16">docker run --rm yashvardhan</text>

    <!-- Left tech labels -->
    <g font-family="Courier New, monospace" font-size="11" opacity="0.5">
      <text x="108" y="108" fill="#3776AB">Python</text>
      <text x="136" y="183" fill="#61DAFB">React</text>
      <text x="172" y="183" fill="#43853D">Node</text>
      <text x="108" y="258" fill="#2496ED">Docker</text>
      <text x="165" y="258" fill="#326CE5">K8s</text>
      <text x="108" y="333" fill="#FF9900">AWS</text>
    </g>

    <!-- Right tech labels -->
    <g font-family="Courier New, monospace" font-size="11" opacity="0.5">
      <text x="1300" y="108" fill="#FF6F00">TensorFlow</text>
      <text x="1300" y="183" fill="#4285F4">GCP</text>
      <text x="1356" y="183" fill="#F05032">Git</text>
      <text x="1296" y="258" fill="#EE0000">Ansible</text>
      <text x="1366" y="258" fill="#623CE4">Terr.</text>
      <text x="1296" y="333" fill="#4EA94B">MongoDB</text>
      <text x="1376" y="333" fill="#005C84">SQL</text>
    </g>

    <!-- Main name (shadow layers first, then fill) -->
    <text x="750" y="196" font-family="Georgia, 'Times New Roman', serif"
          font-size="72" font-weight="700" fill="#0a1828"
          text-anchor="middle" dx="3" dy="3">Yashvardhan Singh</text>
    <text x="750" y="196" font-family="Georgia, 'Times New Roman', serif"
          font-size="72" font-weight="700" fill="#0f2540"
          text-anchor="middle" dx="1.5" dy="1.5">Yashvardhan Singh</text>
    <text x="750" y="196" font-family="Georgia, 'Times New Roman', serif"
          font-size="72" font-weight="700" fill="url(#nameGrad)"
          text-anchor="middle" filter="url(#nameGlow)">Yashvardhan Singh</text>

    <!-- Role tags -->
    <rect x="326" y="222" width="228" height="32" rx="16"
          fill="#1e3a5f" stroke="#7aa2f7" stroke-width="1.2"/>
    <text x="440" y="243" font-family="Courier New, monospace" font-size="13" font-weight="600"
          fill="#6AD3F7" text-anchor="middle">⚡ Full Stack Dev</text>

    <rect x="584" y="222" width="234" height="32" rx="16"
          fill="#1a2a4a" stroke="#7aa2f7" stroke-width="1.2"/>
    <text x="701" y="243" font-family="Courier New, monospace" font-size="13" font-weight="600"
          fill="#6AD3F7" text-anchor="middle">🤖 Data Science</text>

    <rect x="848" y="222" width="228" height="32" rx="16"
          fill="#0f2a3f" stroke="#7aa2f7" stroke-width="1.2"/>
    <text x="962" y="243" font-family="Courier New, monospace" font-size="13" font-weight="600"
          fill="#6AD3F7" text-anchor="middle">🐳 DevOps &amp; Cloud</text>

    <!-- Tagline -->
    <text x="750" y="314" font-family="Courier New, monospace" font-size="17"
          fill="#7aa2f7" text-anchor="middle" opacity="0.85" letter-spacing="2">
      Build it.  Ship it.  Scale it.
    </text>

    <!-- Info line -->
    <text x="750" y="354" font-family="Georgia, serif" font-size="13"
          fill="#4a7a9b" text-anchor="middle" letter-spacing="1">
      📍 India  ·  singhyashvardhan582@gmail.com
    </text>

    <!-- Star particles -->
    <g fill="#6AD3F7" opacity="0.4">
      <circle cx="260"  cy="130" r="1.2"/>
      <circle cx="380"  cy="360" r="1"/>
      <circle cx="620"  cy="50"  r="1.2"/>
      <circle cx="870"  cy="372" r="1"/>
      <circle cx="1050" cy="46"  r="1.2"/>
      <circle cx="1240" cy="362" r="1"/>
      <circle cx="1450" cy="200" r="1.2"/>
      <circle cx="50"   cy="200" r="1"/>
      <circle cx="750"  cy="28"  r="1.5"/>
    </g>

  </g>
</svg>
